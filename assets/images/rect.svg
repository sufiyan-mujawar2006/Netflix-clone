<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="backGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAEC9" />
      <stop offset="100%" stop-color="#E4A0F7" />
    </linearGradient>

    <linearGradient id="frontGrad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4528" />
      <stop offset="45%" stop-color="#E61C53" />
      <stop offset="100%" stop-color="#6F2DA8" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <g transform="translate(140, 120)">
    <rect x="0" y="0" width="180" height="180" rx="36" fill="url(#backGrad)" />
    
    <circle cx="45" cy="65" r="9" fill="#501A3A" />
    <circle cx="135" cy="65" r="9" fill="#501A3A" />
    <path d="M 75,110 Q 95,125 115,110" fill="none" stroke="#501A3A" stroke-width="8" stroke-linecap="round" />
  </g>

  <g transform="translate(230, 210)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="180" rx="36" fill="url(#frontGrad)" />
    
    <circle cx="45" cy="65" r="9" fill="#FFFFFF" />
    <circle cx="135" cy="65" r="9" fill="#FFFFFF" />
    <path d="M 65,110 Q 95,135 125,110" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
